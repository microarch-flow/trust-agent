# Trust Agent example: TypeScript-only project
# All core logic is secret; utilities are public.

version: "1"

assets:
  default: public
  rules:
    - pattern: "src/core/**"
      level: secret
  ignore:
    - "**/*.test.*"
    - "node_modules/**"

models:
  driver:
    provider: anthropic
    model: claude-sonnet-4-20250514
    apiKey: ${ANTHROPIC_API_KEY}

security:
  projection:
    default_level: 1
    max_level: 3
    budget:
      tokens_per_file: 4096
      ask_limit: 20

tools:
  bash:
    policy: workspace_isolated

session:
  max_iterations: 50
